# Pipeline de CI do grupo (Projeto Prático - Eng. de Software II).
# Versao enxuta: uma plataforma e uma versao de Python, rodando a suite
# de testes com cobertura a cada push/pull request. A analise do SonarCloud
# roda automaticamente quando o segredo SONAR_TOKEN estiver configurado.
name: CI (grupo)

on:
  push:
    branches: [master, main]
  pull_request:

env:
  PY_COLORS: 1

jobs:
  test:
    name: Testes + cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # o Sonar precisa do historico para atribuir "blame" das linhas
          fetch-depth: 0

      - name: Instalar uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Instalar poethepoet
        run: uv tool install "poethepoet>=0.26,<0.47.0"

      - name: Instalar dependencias de sistema (binarios de audio)
        run: |
          sudo apt update
          sudo apt install --yes --no-install-recommends \
            ffmpeg imagemagick mp3gain \
            gstreamer1.0-plugins-base gobject-introspection \
            libcairo2-dev libgirepository-2.0-dev python3-gst-1.0

      - name: Instalar o projeto (grupo de teste + extras usados nos testes)
        run: >
          poe install --group test
          --extra fetchart --extra lyrics --extra chroma
          --extra replaygain --extra reflink --extra discogs

      - name: Rodar testes com cobertura
        run: poe test-with-coverage

      - name: Publicar relatorio de cobertura como artefato
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .reports/

      - name: Analise estatica no SonarCloud
        if: ${{ !cancelled() && env.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@v5
