# Configuracao do SonarCloud para o fork do grupo.
# Passos para ativar (issue #K):
#   1. Criar conta em https://sonarcloud.io e importar o repo Cotrims/beets.
#   2. Ajustar projectKey/organization abaixo com os valores gerados pelo Sonar.
#   3. Gerar um token e salva-lo em Settings > Secrets > Actions como SONAR_TOKEN.
# A cobertura consumida pelo Sonar e o coverage.xml gerado por 'poe test-with-coverage'.

sonar.projectKey=Cotrims_beets
sonar.organization=cotrims

sonar.projectName=beets (grupo ES2)
sonar.sources=beets,beetsplug
sonar.tests=test
sonar.python.version=3.10, 3.11, 3.12, 3.13, 3.14
sonar.python.coverage.reportPaths=.reports/coverage.xml

# arquivos que nao entram na analise principal
sonar.exclusions=docs/**,extra/**,man/**
